services:
  hidropuga-shiny:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hidropuga-shiny
    restart: unless-stopped
    expose:
      - "3838"
    environment:
      - TZ=${TZ}
      - APP_PORT=${APP_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASS=${ADMIN_PASS}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
    volumes:
      - ${APP_DIR}:/srv/shiny-server
      - ${LOG_DIR}:/var/log/shiny-server
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3838/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
