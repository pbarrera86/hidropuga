services:
  hidropuga-shiny:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hidropuga-shiny
    restart: unless-stopped
    expose:
      - "3838"
    environment:
      - TZ=${TZ}
    volumes:
      - ${APP_DIR}:/srv/shiny-server
      - ${LOG_DIR}:/var/log/shiny-server
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3838/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
